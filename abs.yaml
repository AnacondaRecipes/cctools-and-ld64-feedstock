build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 2: Rebuild with clang_bootstrap 21 from Stage 1
# This produces cctools with run_constrained: clang 21.*
staging_channel_upload_target: llvm-21.1.8-stage2-build-0

channels:
  # Stage 1 channel has clang_bootstrap 21
  - https://staging.continuum.io/pbp/llvm-21.1.8-stage1-build-0
  # Stage 0 channel has supporting packages (llvmdev, clangdev, libcxx)
  - https://staging.continuum.io/pbp/llvm-21.1.8-stage0-build-0
